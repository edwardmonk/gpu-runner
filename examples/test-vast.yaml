# GPU smoke test on Vast.ai interruptible (cheapest available RTX 3090)
# Run: VAST_API_KEY=your_key python runner.py examples/test-vast.yaml
#
# instance_type is the GPU name filter — Vast picks the cheapest matching offer.
# Register your SSH public key at https://vast.ai/console/account/ first.

provider: vast
instance_type: RTX_3090
ssh_key: ~/.ssh/lambda

inputs: []

script: |
  python3 - <<'EOF'
  import torch, platform, json, datetime

  result = {
    "timestamp": datetime.datetime.utcnow().isoformat(),
    "hostname": platform.node(),
    "python": platform.python_version(),
    "cuda_available": torch.cuda.is_available(),
    "gpu": torch.cuda.get_device_name(0) if torch.cuda.is_available() else "none",
    "vram_gb": round(torch.cuda.get_device_properties(0).total_memory / 1e9, 1) if torch.cuda.is_available() else 0,
    "torch_version": torch.__version__,
    "matmul_result": torch.matmul(
      torch.randn(1000, 1000, device="cuda" if torch.cuda.is_available() else "cpu"),
      torch.randn(1000, 1000, device="cuda" if torch.cuda.is_available() else "cpu")
    ).mean().item(),
  }

  with open("/tmp/test_result.json", "w") as f:
    import json; json.dump(result, f, indent=2)

  print(json.dumps(result, indent=2))
  EOF

outputs:
  - remote: /tmp/test_result.json
    local: /tmp/vast_test_result.json
